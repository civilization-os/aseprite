name: release-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - uses: aseprite/get-ninja@main
    - uses: ilammy/msvc-dev-cmd@v1

    - name: Install Skia
      shell: bash
      run: |
        this_dir="${{ github.workspace }}"
        skia_url=$(source $this_dir/laf/misc/skia-url.sh | xargs)
        skia_file=$(basename $skia_url)
        echo "Downloading Skia from: $skia_url"
        curl --ssl-revoke-best-effort -L -o "$skia_file" "$skia_url"
        unzip "$skia_file" -d skia

    - name: Generating Makefiles
      shell: bash
      run: |
        export enable_ccache=off
        export laf_backend=skia
        export enable_scripting=on
        export skia_arch=x64

        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo \
          -DENABLE_TESTS=OFF \
          -DENABLE_SCRIPTING=$enable_scripting \
          -DENABLE_CCACHE=$enable_ccache \
          -DLAF_BACKEND=$laf_backend \
          -DSKIA_DIR=$(realpath skia) \
          -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-$skia_arch)

    - name: Compiling
      shell: bash
      run: |
        cd build && ninja aseprite

    - name: Create Distribution Directory
      shell: pwsh
      run: |
        $distDir = Join-Path $PWD 'dist/Aseprite'
        $binDir = Join-Path $PWD 'build/bin'
        $libDir = Join-Path $PWD 'build/lib'
        $exePath = Join-Path $binDir 'aseprite.exe'

        New-Item -ItemType Directory -Force -Path $distDir | Out-Null
        Copy-Item $exePath $distDir -Force
        if (Test-Path (Join-Path $binDir 'data')) {
          Copy-Item (Join-Path $binDir 'data') $distDir -Recurse -Force
        }

        $searchDirs = @($binDir, $libDir)
        $searchDirs += ($env:PATH -split ';' | Where-Object { $_ -and (Test-Path $_) })
        $searchDirs = $searchDirs | Select-Object -Unique

        $windowsDirs = @(
          $env:windir,
          (Join-Path $env:windir 'System32'),
          (Join-Path $env:windir 'SysWOW64')
        ) | ForEach-Object { $_.ToLowerInvariant() }

        function Get-DllDependencies([string]$binaryPath) {
          $lines = & dumpbin /nologo /dependents $binaryPath
          foreach ($line in $lines) {
            $name = $line.Trim()
            if ($name -match '\.dll$' -and
                $name -notlike 'api-ms-win-*' -and
                $name -notlike 'ext-ms-*') {
              $name
            }
          }
        }

        function Resolve-DllPath([string]$dllName) {
          foreach ($dir in $searchDirs) {
            $candidate = Join-Path $dir $dllName
            if (Test-Path $candidate) {
              $fullPath = (Resolve-Path $candidate).Path
              $lowerPath = $fullPath.ToLowerInvariant()
              if (-not ($windowsDirs | Where-Object { $lowerPath.StartsWith($_) })) {
                return $fullPath
              }
            }
          }
          return $null
        }

        $queued = [System.Collections.Generic.Queue[string]]::new()
        $seen = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
        $copied = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
        $queued.Enqueue($exePath)

        while ($queued.Count -gt 0) {
          $current = $queued.Dequeue()
          if (-not $seen.Add($current)) {
            continue
          }

          foreach ($dllName in Get-DllDependencies $current) {
            $resolved = Resolve-DllPath $dllName
            if (-not $resolved) {
              Write-Warning "Unresolved runtime dependency: $dllName"
              continue
            }

            $targetPath = Join-Path $distDir ([System.IO.Path]::GetFileName($resolved))
            if ($copied.Add($resolved)) {
              Copy-Item $resolved $targetPath -Force
            }
            $queued.Enqueue($resolved)
          }
        }

        Write-Output 'Packaged files:'
        Get-ChildItem $distDir | Select-Object Name, Length | Format-Table -AutoSize

    - name: Create Release Artifact
      shell: pwsh
      run: |
        # Build a filesystem-safe artifact name for both tag and manual branch runs.
        $version = "${{ github.ref_name }}"
        if (-not $version) {
          $version = "${{ github.sha }}".Substring(0, 7)
        }
        $version = $version -replace '[\\/:*?"<>|]', '-'
        $filename = "aseprite-$version-windows-x64.zip"
        Compress-Archive -Path dist/Aseprite -DestinationPath $filename
        Write-Output "Created: $filename"
        Write-Output "filename=$filename" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: aseprite-${{ github.ref_name }}-windows-x64.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: aseprite-windows-build
        path: dist/Aseprite/
        retention-days: 7
